bt_navigator_rclcpp_node:
  ros__parameters:
    use_sim_time: false

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    progress_checker_plugin: "progress_checker"
    goal_checker_plugin: "goal_checker"
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: True
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.4 #所需使用的最大线速度 (m/s)。
      lookahead_dist: 0.6 #当 use_velocity_scaled_lookahead_dist 为 false 时，用于找到超前点的超前距离 (m)。
      min_lookahead_dist: 0.3 #参数 use_velocity_scaled_lookahead_dist 为 true 时的最小超前距离 (m) 阈值。
      max_lookahead_dist: 0.9 #参数 use_velocity_scaled_lookahead_dist 为 true 时的最大超前距离 (m) 阈值。 
      lookahead_time: 1.5 #当 use_velocity_scaled_lookahead_dist 为 true 时，预测速度的时间。也被称为超前增益。
      rotate_to_heading_angular_vel: 0.8 #如果 use_rotate_to_heading 是 true ，这是使用的角速度。
      transform_tolerance: 0.1 #TF变换公差。
      use_velocity_scaled_lookahead_dist: false #是否使用速度缩放的超前距离或常数 lookahead_distance 。
      min_approach_linear_velocity: 0.1 #接近目标时应用的最小速度 (m/s) 阈值，以确保进度。必须是 > 0.01 。
      max_allowed_time_to_collision_up_to_carrot: 1.0 #向前投射速度命令以检查碰撞的时间。前 Humble ，这是 max_allowed_time_to_collision 。
      use_regulated_linear_velocity_scaling: true #是否对路径曲率使用调节特征 (例如在高曲率路径上运行缓慢)。
      use_cost_regulated_linear_velocity_scaling: false #是否使用受管制的特征来接近障碍物 (例如，接近障碍物时速度慢)。 
      regulated_linear_scaling_min_radius: 0.5 #当 use_regulated_linear_velocity_scaling 为 tru 时，触发调节特征的转弯半径 (m)。记住，更尖锐的转弯半径更小。 
      regulated_linear_scaling_min_speed: 0.25 #任何受监管的试探法可以发送的最小速度 (m/s)，以确保即使在具有高曲率的高成本空间中，过程仍然可以实现。必须是 > 0.1 。 
      use_rotate_to_heading: false #使用完整的planner时，是否能够旋转到粗糙的航向和目标方向。推荐用于所有可以就地旋转的机器人类型。 
      allow_reversing: true #当计划的路径涉及反向 (由方向尖点表示) 时，使机器人能够反向驱动。
      rotate_to_heading_min_angle: 0.785 #如果 use_rotate_to_heading 是 true ，路径方向和启动机器人方向 (弧度) 的差异会触发旋转。
      max_angular_accel: 3.2 #如果 use_rotate_to_heading 为 true ，则旋转至航向时的最大允许角加速度 (rad/s)。


controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: false

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      footprint: "[ [0.8, 0.4], [0.8, -0.4], [-0.8, -0.4], [-0.8, 0.4] ]"
      #robot_radius: 0.9
      plugins: ["voxel_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
      static_layer:
        map_subscribe_transient_local: True
      always_send_full_costmap: True
  local_costmap_client:
    ros__parameters:
      use_sim_time: false
  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: false

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: false
      footprint: "[ [0.9, 0.5], [0.9, -0.5], [-0.9, -0.5], [-0.9, 0.5] ]"
      #robot_radius: 0.9
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: True    #是否每次更新都发送完整的成本图，而不是更新
  global_costmap_client:
    ros__parameters:
      use_sim_time: false
  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: false

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: "car_map.yaml"

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5000
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: False

recoveries_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    recovery_plugins: ["spin", "back_up", "wait"]
    spin:
      plugin: "nav2_recoveries/Spin"
    back_up:
      plugin: "nav2_recoveries/BackUp"
    wait:
      plugin: "nav2_recoveries/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_timeout: 0.1
    use_sim_time: false
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

robot_state_publisher:
  ros__parameters:
    use_sim_time: false

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true
      
planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: false
    
waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"   
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200