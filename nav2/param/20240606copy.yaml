amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2   #从旋转角度考虑机器人里程计的旋转噪声
    alpha2: 0.2   #机器人平移分量中的里程计旋转噪音，噪声在机器人左右两边分布
    alpha3: 0.2   #机器人平移过程中的里程计平移噪音，沿着机器人前进方向分布
    alpha4: 0.2   #机器人旋转过程中的里程计平移噪音， 斜角方向上的运动噪声
    alpha5: 0.2   #仅适用于全向式（Omni）: 平移噪声。
    base_frame_id: "base_footprint"   #机器人基座frame名称。
    beam_skip_distance: 0.5   #设置忽略掉似然场模型中大多数粒子与地图不一致的光束，表示忽略的最大距离单位 (m) 。
    beam_skip_error_threshold: 0.9  #不匹配地图后的光束百分比，由于不一致而强制完全更新。
    beam_skip_threshold: 0.3   #需要跳过的光束（beams ）的百分比。
    do_beamskip: false   #是否在似然场模型（Likelihood field model）中进行波束（beam ）跳过。
    global_frame_id: "map"    #定位系统发布的坐标系名称。
    lambda_short: 0.1    #模型z_short部分的指数衰减参数。
    laser_likelihood_max_dist: 2.0    #在地图上进行障碍物充气的最大距离，用于likelihood_field模型。
    laser_max_range: 100.0   #要考虑的最大扫描范围，设为-1.0会直接使用激光报告的最大范围。
    laser_min_range: -1.0    #要考虑的最小扫描范围，-1.0将使用激光发出的的最小范围。
    laser_model_type: "likelihood_field"     #使用哪个模型，beam、likelihood_field 或 likelihood_field_prob。likelihood_field_prob 包含beamskip功能。
    max_beams: 60    #AMCL从参数 initial_pose* 设置机器人初始姿势，而不是等待话题 initial_pose ` 消息。
    max_particles: 2000     #所允许的最大粒子数。
    min_particles: 500    #所允许的最小粒子数。
    odom_frame_id: "odom"   #里程计使用的frame名称。
    pf_err: 0.05    #粒子过滤器总体误差。
    pf_z: 0.99   #粒子过滤器总体密度。
    recovery_alpha_fast: 0.0    #快速平均重量过滤器的指数衰减率，用于决定何时通过添加随机姿势来恢复。一个好的值可能是0.001。
    recovery_alpha_slow: 0.0    #慢平均重量过滤器的指数衰减率，用于通过添加随机姿势来决定何时恢复。一个好的值可能是0.001。
    resample_interval: 1   #重新采样前所需的过滤器更新数量。
    robot_model_type: "differential"     #插件类的完全限定类型。可以值为nav2_amcl::DifferentialMotionModel和nav2_amcl::OmniMotionModel。
    save_pose_rate: 0.5    #将最后估计姿态和协方差存储到参数服务器的最大速率 (Hz)，在变量 ~initial_pose_* 和 ~initial_cov_* 中。此保存的姿势将在后续运行中用于初始化过滤器 (-1.0表示禁用)。
    sigma_hit: 0.2   #用于设置在模型z_hit部分中使用的高斯模型的标准差。
    tf_broadcast: false   #用于设置是否广播坐标变换。参数False可以以防止amcl发布全局坐标系和里程计坐标系之间的坐标变换。 
    transform_tolerance: 1.0   #TF转换发布后的，该转换的所维持的有效时间。
    update_min_a: 0.2    #在执行过滤器更新之前需要的最小旋转角度。
    update_min_d: 0.25   #在执行过滤器更新之前需要的最小平移距离。
    z_hit: 0.5    #模型中z_hit部分的混合权重，所有使用的z权重之和必须为1。光束（Beam）模型使用所有共4个z_*权重，而似然模型（Likelihood）使用z_hit和z_rand权重。
    z_max: 0.05   #模型中z_max部分的混合权重，所有使用的z权重之和必须为1。光束（Beam）模型使用所有共4个z_*权重，而似然模型（Likelihood）使用z_hit和z_rand权重。
    z_rand: 0.5   #模型中z_rand部分的混合权重，所有使用的z权重之和必须为1。光束（Beam）模型使用所有共4个z_*权重，而似然模型（Likelihood）使用z_hit和z_rand权重。
    z_short: 0.05 #模型中z_short部分的混合权重，所有使用的z权重之和必须为1。光束（Beam）模型使用所有共4个z_*权重，而似然模型（Likelihood）使用z_hit和z_rand权重。
    scan_topic: scan  #要订阅的激光雷达话题名称。
    map_topic: map   #用于订阅地图的话题名称。
    set_initial_pose: false
    always_reset_initial_pose: false
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

amcl_map_client:
  ros__parameters:
    use_sim_time: false

amcl_rclcpp_node:
  ros__parameters:
