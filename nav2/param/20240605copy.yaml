robot_state_publisher:
  ros__parameters:
    use_sim_time: false


    
planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    use_sim_time: false
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      downsample_costmap: false           # 是否向下采样costmap到另一个分辨率进行搜索。
      downsampling_factor: 1              # 乘数因子向下采样成本图 (例如，如果5厘米成本图在2 downsample_factor ，10厘米输出)。
      allow_unknown: true                 # 是否允许在未知空间中遍历/搜索。
      max_iterations: 1000000             # 未能限制计算时间之前的最大搜索迭代次数，由-1禁用。
      max_planning_time: 5.0              # 最大计划时间 (秒)。
      motion_model_for_search: "DUBIN"    # 要搜索的运动模型枚举string。对于混合-A*节点，默认值为 "DUBIN" 。SE2的选项是DUBIN或REEDS_SHEPP。
      angle_quantization_bins: 72         # 用于SE2搜索的角仓数量。这可以是任何偶数，但是一个好的基线是64或72 (5度增量)。
      analytic_expansion_ratio: 3.5       # The ratio to attempt analytic expansions during search for final approach.
      analytic_expansion_max_length: 3.0  # For Hybrid/Lattice nodes: The maximum length of the analytic expansion to be considered valid to prevent unsafe shortcutting
      minimum_turning_radius: 2.40        # 车辆的最小转弯半径 (米)。也用于平滑器计算最大曲率。
      reverse_penalty: 2.0                # 如果反向搜索，将启发式惩罚应用于SE2节点。仅用于 REEDS_SHEPP 运动模型。
      change_penalty: 0.0                 # 如果在搜索中改变方向 (例如从左到右)，将对SE2节点施加启发式惩罚。更改后默认禁用，以保证混合-A*planner的可接受性。
      non_straight_penalty: 1.2           # 如果在非直线方向搜索，则适用于SE2节点的启发式惩罚。
      cost_penalty: 2.0                   # 将启发式惩罚应用于SE2节点的姿态成本。允许混合-A*了解成本。Penalty to apply to higher cost areas when adding into the obstacle map dynamic programming distance expansion heuristic. This drives the robot more towards the center of passages. A value between 1.3 - 3.5 is reasonable.
      retrospective_penalty: 0.015
      lookup_table_size: 20.0             # Size of the dubin/reeds-sheep distance window to cache, in meters.
      cache_obstacle_heuristic: false     # 缓存障碍图动态编程距离扩展启发式算法在相同目标位置的辅助补充之间。如果costmap在很大程度上是静态的，则极大地加快了重新规划性能 (40倍)。Cache the obstacle map dynamic programming distance expansion heuristic between subsiquent replannings of the same goal location. Dramatically speeds up replanning performance (40x) if costmap is largely static.
      smooth_path: True                   # If true, does a simple and quick smoothing post-processing to the path

      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1e-10
        do_refinement: true